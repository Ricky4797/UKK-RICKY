<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buat Diskusi - Photography Forum</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../style/style.css">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body class="diskusi-fotography-body">

  <!-- NAVBAR -->
  <nav class="navbar fixed-top diskusi-fotography-navbar">

    <div class="container">

      <a class="navbar-brand diskusi-fotography-navbar-brand" href="#">
        Ruang<span>Hobi</span>
      </a>

    </div>

  </nav>

  <!-- SECTION -->
  <section class="diskusi-fotography-create-section">

    <div class="container">

      <div class="row justify-content-center">

        <div class="col-lg-8">

          <div class="diskusi-fotography-create-card">

            <span class="diskusi-fotography-tag">
              Photography Community Discussion
            </span>

            <h1>
              Buat Diskusi Fotografi
            </h1>

            <p>
              Bagikan pengalaman fotografimu,
              teknik editing, atau hasil jepretan favoritmu.
            </p>

            <!-- FORM -->
            <form>

              <!-- JUDUL -->
              <div class="mb-4">

                <label class="diskusi-fotography-form-label">
                  Judul Diskusi
                </label>

                <input
                type="text"
                class="form-control diskusi-fotography-form-control"
                placeholder="Contoh: Tips Foto Sunset Biar Lebih Cinematic">

              </div>

              <!-- KATEGORI -->
              <div class="mb-4">

                <label class="diskusi-fotography-form-label">
                  Kategori
                </label>

                <select class="form-select diskusi-fotography-form-select">

                  <option selected disabled>
                    Pilih kategori
                  </option>

                  <option>
                    Street Photography
                  </option>

                  <option>
                    Portrait
                  </option>

                  <option>
                    Landscape
                  </option>

                  <option>
                    Editing & Lightroom
                  </option>

                  <option>
                    Camera Gear
                  </option>

                </select>

              </div>

              <!-- ISI -->
              <div class="mb-4">

                <label class="diskusi-fotography-form-label">
                  Isi Diskusi
                </label>

                <textarea
                class="form-control diskusi-fotography-form-control diskusi-fotography-textarea"
                placeholder="Tulis isi diskusimu di sini..."></textarea>

              </div>

              <!-- TAG -->
              <div class="mb-4">

                <label class="diskusi-fotography-form-label">
                  Tag
                </label>

                <input
                type="text"
                class="form-control diskusi-fotography-form-control"
                placeholder="Contoh: Nikon, Lightroom, Street Photo">

              </div>

              <!-- BUTTON -->
              <div class="diskusi-fotography-button-group">

                <button type="submit" class="diskusi-fotography-btn-submit">
                  <i class="fa-solid fa-paper-plane me-2"></i>
                  Publish Diskusi
                </button>

                <a href="../fotografi-forum.html" class="diskusi-fotography-btn-back">
                  ← Kembali
                </a>

              </div>

            </form>

          </div>

        </div>

      </div>

    </div>

  </section>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
