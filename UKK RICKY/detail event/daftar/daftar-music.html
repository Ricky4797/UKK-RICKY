<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar Event - Music Festival Night</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../style/style.css">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body class="daftar-music-body">

  <!-- NAVBAR -->
  <nav class="navbar daftar-music-navbar fixed-top">

    <div class="container">

      <a class="navbar-brand daftar-music-navbar-brand" href="#">
        Ruang<span>Hobi</span>
      </a>

    </div>

  </nav>

  <!-- FORM -->
  <section class="daftar-music-form-section">

    <div class="container">

      <div class="row justify-content-center">

        <div class="col-lg-8">

          <div class="daftar-music-form-card">

            <span class="daftar-music-tag">
              Event Registration
            </span>

            <h1>
              Daftar Music Festival Night
            </h1>

            <p>
              Isi data diri kamu untuk mengikuti event Music Festival Night.
            </p>

            <!-- EVENT INFO -->
            <div class="daftar-music-event-info">

              <div>
                <i class="fa-solid fa-calendar"></i>
                14 Mei 2026
              </div>

              <div>
                <i class="fa-solid fa-location-dot"></i>
                Jakarta Convention Hall
              </div>

              <div>
                <i class="fa-solid fa-users"></i>
                2.500 Peserta
              </div>

            </div>

            <!-- FORM -->
            <form>

              <div class="mb-4">

                <label class="daftar-music-form-label">
                  Nama Lengkap
                </label>

                <input
                  type="text"
                  class="form-control daftar-music-form-control"
                  placeholder="Masukkan nama lengkap"
                >

              </div>

              <div class="mb-4">

                <label class="daftar-music-form-label">
                  Email
                </label>

                <input
                  type="email"
                  class="form-control daftar-music-form-control"
                  placeholder="Masukkan email"
                >

              </div>

              <div class="mb-4">

                <label class="daftar-music-form-label">
                  Nomor HP
                </label>

                <input
                  type="text"
                  class="form-control daftar-music-form-control"
                  placeholder="Masukkan nomor HP"
                >

              </div>

              <div class="mb-4">

                <label class="daftar-music-form-label">
                  Pilih Tiket
                </label>

                <select class="form-select daftar-music-form-select">

                  <option selected disabled>
                    Pilih jenis tiket
                  </option>

                  <option>
                    Regular - Rp50.000
                  </option>

                  <option>
                    VIP - Rp150.000
                  </option>

                  <option>
                    VVIP - Rp300.000
                  </option>

                </select>

              </div>

              <div class="mb-4">

                <label class="daftar-music-form-label">
                  Metode Pembayaran
                </label>

                <select class="form-select daftar-music-form-select">

                  <option selected disabled>
                    Pilih pembayaran
                  </option>

                  <option>
                    Dana
                  </option>

                  <option>
                    OVO
                  </option>

                  <option>
                    GoPay
                  </option>

                  <option>
                    Transfer Bank
                  </option>

                </select>

              </div>

              <!-- BUTTON -->
              <button
                type="submit"
                class="daftar-music-btn-submit"
              >
                Konfirmasi Pendaftaran
              </button>

            </form>

            <a
              href="../detailmusic.html"
              class="daftar-music-btn-back"
            >
              ← Kembali ke detail event
            </a>

          </div>

        </div>

      </div>

    </div>

  </section>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
