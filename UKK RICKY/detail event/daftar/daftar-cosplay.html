<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar Cosplay Competition - Ruang Hobi</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../style/style.css">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body class="daftar-cosplay-body">

  <!-- NAVBAR -->
  <nav class="navbar daftar-cosplay-navbar fixed-top">

    <div class="container">

      <a class="navbar-brand daftar-cosplay-navbar-brand" href="#">
        Ruang<span>Hobi</span>
      </a>

    </div>

  </nav>

  <!-- FORM -->
  <section class="daftar-cosplay-form-section">

    <div class="container">

      <div class="row justify-content-center">

        <div class="col-lg-8">

          <div class="daftar-cosplay-form-card">

            <span class="daftar-cosplay-tag">
              Anime & Cosplay Registration
            </span>

            <h1>
              Daftar Cosplay Competition
            </h1>

            <p>
              Isi data diri kamu untuk mengikuti event Cosplay Competition.
            </p>

            <!-- EVENT INFO -->
            <div class="daftar-cosplay-event-info">

              <div>
                <i class="fa-solid fa-calendar"></i>
                28 Mei 2026
              </div>

              <div>
                <i class="fa-solid fa-location-dot"></i>
                Bandung Creative Hall
              </div>

              <div>
                <i class="fa-solid fa-users"></i>
                3.000 Peserta
              </div>

            </div>

            <!-- FORM -->
            <form>

              <div class="mb-4">

                <label class="daftar-cosplay-form-label">
                  Nama Lengkap
                </label>

                <input
                  type="text"
                  class="form-control daftar-cosplay-form-control"
                  placeholder="Masukkan nama lengkap"
                >

              </div>

              <div class="mb-4">

                <label class="daftar-cosplay-form-label">
                  Email
                </label>

                <input
                  type="email"
                  class="form-control daftar-cosplay-form-control"
                  placeholder="Masukkan email"
                >

              </div>

              <div class="mb-4">

                <label class="daftar-cosplay-form-label">
                  Nomor HP
                </label>

                <input
                  type="text"
                  class="form-control daftar-cosplay-form-control"
                  placeholder="Masukkan nomor HP"
                >

              </div>

              <div class="mb-4">

                <label class="daftar-cosplay-form-label">
                  Nama Karakter Cosplay
                </label>

                <input
                  type="text"
                  class="form-control daftar-cosplay-form-control"
                  placeholder="Contoh: Naruto Uzumaki"
                >

              </div>

              <div class="mb-4">

                <label class="daftar-cosplay-form-label">
                  Kategori Cosplay
                </label>

                <select class="form-select daftar-cosplay-form-select">

                  <option selected disabled>
                    Pilih kategori
                  </option>

                  <option>
                    Anime
                  </option>

                  <option>
                    Game
                  </option>

                  <option>
                    Movie
                  </option>

                  <option>
                    Original Character
                  </option>

                </select>

              </div>

              <div class="mb-4">

                <label class="daftar-cosplay-form-label">
                  Metode Pembayaran
                </label>

                <select class="form-select daftar-cosplay-form-select">

                  <option selected disabled>
                    Pilih pembayaran
                  </option>

                  <option>
                    Dana
                  </option>

                  <option>
                    OVO
                  </option>

                  <option>
                    GoPay
                  </option>

                  <option>
                    Transfer Bank
                  </option>

                </select>

              </div>

              <!-- BUTTON -->
              <button
                type="submit"
                class="daftar-cosplay-btn-submit"
              >
                Konfirmasi Pendaftaran
              </button>

            </form>

            <a
              href="../detailcosplay.html"
              class="daftar-cosplay-btn-back"
            >
              ← Kembali ke detail event
            </a>

          </div>

        </div>

      </div>

    </div>

  </section>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
