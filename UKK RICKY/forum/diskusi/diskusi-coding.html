<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buat Diskusi - Coding Forum</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../style/style.css">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body class="diskusi-coding-body">

  <!-- NAVBAR -->
  <nav class="navbar fixed-top diskusi-coding-navbar">

    <div class="container">

      <a class="navbar-brand diskusi-coding-navbar-brand" href="#">
        Ruang<span>Hobi</span>
      </a>

    </div>

  </nav>

  <!-- SECTION -->
  <section class="diskusi-coding-create-section">

    <div class="container">

      <div class="row justify-content-center">

        <div class="col-lg-8">

          <div class="diskusi-coding-create-card">

            <span class="diskusi-coding-tag">
              Coding Community Discussion
            </span>

            <h1>
              Buat Diskusi Coding
            </h1>

            <p>
              Bagikan pertanyaan coding,
              diskusi teknologi,
              atau pengalaman programming-mu di sini.
            </p>

            <!-- FORM -->
            <form>

              <!-- JUDUL -->
              <div class="mb-4">

                <label class="diskusi-coding-form-label">
                  Judul Diskusi
                </label>

                <input
                type="text"
                class="form-control diskusi-coding-form-control"
                placeholder="Contoh: Cara Belajar JavaScript Untuk Pemula">

              </div>

              <!-- KATEGORI -->
              <div class="mb-4">

                <label class="diskusi-coding-form-label">
                  Kategori
                </label>

                <select class="form-select diskusi-coding-form-select">

                  <option selected disabled>
                    Pilih kategori
                  </option>

                  <option>
                    Frontend Development
                  </option>

                  <option>
                    Backend Development
                  </option>

                  <option>
                    Mobile App
                  </option>

                  <option>
                    UI/UX
                  </option>

                  <option>
                    Programming Tips
                  </option>

                </select>

              </div>

              <!-- ISI -->
              <div class="mb-4">

                <label class="diskusi-coding-form-label">
                  Isi Diskusi
                </label>

                <textarea
                class="form-control diskusi-coding-form-control diskusi-coding-textarea"
                placeholder="Tulis isi diskusimu di sini..."></textarea>

              </div>

              <!-- TAG -->
              <div class="mb-4">

                <label class="diskusi-coding-form-label">
                  Tag
                </label>

                <input
                type="text"
                class="form-control diskusi-coding-form-control"
                placeholder="Contoh: HTML, CSS, JavaScript">

              </div>

              <!-- BUTTON -->
              <div class="diskusi-coding-button-group">

                <button type="submit" class="diskusi-coding-btn-submit">
                  <i class="fa-solid fa-paper-plane me-2"></i>
                  Publish Diskusi
                </button>

                <a href="../coding-forum.html" class="diskusi-coding-btn-back">
                  ← Kembali
                </a>

              </div>

            </form>

          </div>

        </div>

      </div>

    </div>

  </section>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
