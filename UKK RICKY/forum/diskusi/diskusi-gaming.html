<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buat Diskusi - Gaming Forum</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../style/style.css">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body class="diskusi-gaming-body">

  <!-- NAVBAR -->
  <nav class="navbar diskusi-gaming-navbar fixed-top">

    <div class="container">

      <a class="navbar-brand diskusi-gaming-navbar-brand" href="#">
        Ruang<span>Hobi</span>
      </a>

    </div>

  </nav>

  <!-- SECTION -->
  <section class="diskusi-gaming-create-section">

    <div class="container">

      <div class="row justify-content-center">

        <div class="col-lg-8">

          <div class="diskusi-gaming-create-card">

            <span class="diskusi-gaming-tag">
              Gaming Community Discussion
            </span>

            <h1>
              Buat Diskusi Baru
            </h1>

            <p>
              Bagikan pertanyaan, pengalaman,
              atau topik gaming favoritmu ke komunitas.
            </p>

            <!-- FORM -->
            <form>

              <!-- JUDUL -->
              <div class="mb-4">

                <label class="diskusi-gaming-form-label">
                  Judul Diskusi
                </label>

                <input
                type="text"
                class="form-control diskusi-gaming-form-control"
                placeholder="Contoh: Rekomendasi Mouse Gaming Terbaik">

              </div>

              <!-- KATEGORI -->
              <div class="mb-4">

                <label class="diskusi-gaming-form-label">
                  Kategori
                </label>

                <select class="form-select diskusi-gaming-form-select">

                  <option selected disabled>
                    Pilih kategori
                  </option>

                  <option>
                    PC Gaming
                  </option>

                  <option>
                    Mobile Gaming
                  </option>

                  <option>
                    Console
                  </option>

                  <option>
                    Esports
                  </option>

                  <option>
                    Gaming Setup
                  </option>

                </select>

              </div>

              <!-- ISI -->
              <div class="mb-4">

                <label class="diskusi-gaming-form-label">
                  Isi Diskusi
                </label>

                <textarea
                class="form-control diskusi-gaming-form-control diskusi-gaming-textarea"
                placeholder="Tulis isi diskusimu di sini..."></textarea>

              </div>

              <!-- TAG -->
              <div class="mb-4">

                <label class="diskusi-gaming-form-label">
                  Tag
                </label>

                <input
                type="text"
                class="form-control diskusi-gaming-form-control"
                placeholder="Contoh: Valorant, Setup, Keyboard">

              </div>

              <!-- BUTTON -->
              <div class="diskusi-gaming-button-group">

                <button type="submit" class="diskusi-gaming-btn-submit">
                  <i class="fa-solid fa-paper-plane me-2"></i>
                  Publish Diskusi
                </button>

                <a href="../gaming-forum.html" class="diskusi-gaming-btn-back">
                  ← Kembali
                </a>

              </div>

            </form>

          </div>

        </div>

      </div>

    </div>

  </section>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
