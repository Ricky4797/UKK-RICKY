<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar Mini Hackathon - Ruang Hobi</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../style/style.css">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body class="daftar-coding-body">

  <!-- NAVBAR -->
  <nav class="navbar fixed-top daftar-coding-navbar">

    <div class="container">

      <a class="navbar-brand daftar-coding-navbar-brand" href="#">
        Ruang<span>Hobi</span>
      </a>

    </div>

  </nav>

  <!-- FORM -->
  <section class="daftar-coding-form-section">

    <div class="container">

      <div class="row justify-content-center">

        <div class="col-lg-8">

          <div class="daftar-coding-form-card">

            <span class="daftar-coding-tag">
              Coding Event Registration
            </span>

            <h1>
              Daftar Mini Hackathon
            </h1>

            <p>
              Isi data diri kamu untuk mengikuti event Mini Hackathon.
            </p>

            <!-- EVENT INFO -->
            <div class="daftar-coding-event-info">

              <div>
                <i class="fa-solid fa-calendar"></i>
                20 Mei 2026
              </div>

              <div>
                <i class="fa-solid fa-location-dot"></i>
                Online Event
              </div>

              <div>
                <i class="fa-solid fa-users"></i>
                1.200 Peserta
              </div>

            </div>

            <!-- FORM -->
            <form>

              <div class="mb-4">

                <label class="daftar-coding-form-label">
                  Nama Lengkap
                </label>

                <input
                type="text"
                class="form-control daftar-coding-form-control"
                placeholder="Masukkan nama lengkap">

              </div>

              <div class="mb-4">

                <label class="daftar-coding-form-label">
                  Email
                </label>

                <input
                type="email"
                class="form-control daftar-coding-form-control"
                placeholder="Masukkan email">

              </div>

              <div class="mb-4">

                <label class="daftar-coding-form-label">
                  Nomor HP
                </label>

                <input
                type="text"
                class="form-control daftar-coding-form-control"
                placeholder="Masukkan nomor HP">

              </div>

              <div class="mb-4">

                <label class="daftar-coding-form-label">
                  Skill Utama
                </label>

                <select class="form-select daftar-coding-form-select">

                  <option selected disabled>
                    Pilih skill
                  </option>

                  <option>
                    Front-End Developer
                  </option>

                  <option>
                    Back-End Developer
                  </option>

                  <option>
                    Fullstack Developer
                  </option>

                  <option>
                    UI/UX Designer
                  </option>

                </select>

              </div>

              <div class="mb-4">

                <label class="daftar-coding-form-label">
                  Bahasa Pemrograman
                </label>

                <input
                type="text"
                class="form-control daftar-coding-form-control"
                placeholder="Contoh: JavaScript, Python">

              </div>

              <div class="mb-4">

                <label class="daftar-coding-form-label">
                  Metode Pembayaran
                </label>

                <select class="form-select daftar-coding-form-select">

                  <option selected disabled>
                    Pilih pembayaran
                  </option>

                  <option>
                    Dana
                  </option>

                  <option>
                    OVO
                  </option>

                  <option>
                    GoPay
                  </option>

                  <option>
                    Transfer Bank
                  </option>

                </select>

              </div>

              <!-- BUTTON -->
              <button type="submit" class="daftar-coding-btn-submit">
                Konfirmasi Pendaftaran
              </button>

            </form>

            <a href="../detailcoding.html" class="daftar-coding-btn-back">
              ← Kembali ke detail event
            </a>

          </div>

        </div>

      </div>

    </div>

  </section>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
